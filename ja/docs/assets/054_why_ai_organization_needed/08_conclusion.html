<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <style>* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
}

.canvas {
  width: 1600px;
  height: 900px;
  padding: 52px;
  position: relative;
  overflow: hidden;
}

.title {
  margin: 0 0 10px;
  font-size: 56px;
  font-weight: 800;
  line-height: 1.08;
}

.subtitle {
  margin: 0;
  font-size: 24px;
  color: var(--muted);
}

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 28px;
  box-shadow: 0 16px 36px rgba(28, 53, 86, 0.08);
  padding: 28px;
}

.panel h2 {
  margin: 0 0 14px;
  font-size: 34px;
}

.panel p {
  margin: 0;
  font-size: 22px;
  line-height: 1.5;
  color: var(--muted);
}

.compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
}

.stack {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.box {
  padding: 18px 20px;
  border-radius: 20px;
  border: 1px solid var(--line);
  background: #fff;
  font-size: 27px;
  font-weight: 700;
  text-align: center;
}

.soft-blue { background: var(--primary-soft); border-color: #cbdcff; }
.soft-orange { background: var(--warning-soft); border-color: #ffd5b7; }
.soft-green { background: var(--positive-soft); border-color: #bae9d8; }
.soft-red { background: var(--danger-soft); border-color: #f4c3c3; }

.h-flow {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: nowrap;
}

.step {
  min-width: 220px;
  padding: 18px 20px;
  border-radius: 20px;
  background: #fff;
  border: 1px solid var(--line);
  text-align: center;
  font-size: 26px;
  font-weight: 700;
}

.chev {
  font-size: 44px;
  color: var(--primary);
  font-weight: 800;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}

.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}

.card,
.mini {
  padding: 22px;
  border-radius: 22px;
  background: #fff;
  border: 1px solid var(--line);
}

.card h3,
.mini h3 {
  margin: 0 0 12px;
  font-size: 24px;
}

.card p,
.mini p {
  margin: 0;
  font-size: 20px;
  line-height: 1.45;
  color: var(--muted);
}

.badge {
  display: inline-block;
  margin-bottom: 14px;
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 18px;
  font-weight: 800;
}

.b-blue { background: var(--primary-soft); color: var(--primary); }
.b-orange { background: var(--warning-soft); color: var(--warning); }
.b-green { background: var(--positive-soft); color: var(--positive); }
.b-red { background: var(--danger-soft); color: var(--danger); }

.center {
  display: grid;
  place-items: center;
  height: 100%;
}

.hub {
  width: 280px;
  height: 280px;
  border-radius: 999px;
  border: 3px solid #c9dafc;
  background: var(--primary-soft);
  display: grid;
  place-items: center;
  font-size: 48px;
  font-weight: 800;
  color: var(--primary);
  text-align: center;
}

.orbit {
  position: absolute;
  width: 220px;
  padding: 16px;
  border-radius: 20px;
  background: #fff;
  border: 1px solid var(--line);
  text-align: center;
  font-size: 23px;
  font-weight: 700;
}

.o-top { top: 170px; left: 690px; }
.o-left { top: 375px; left: 240px; }
.o-right { top: 375px; right: 240px; }
.o-bottom { bottom: 100px; left: 690px; }
.o-tl { top: 230px; left: 420px; }
.o-tr { top: 230px; right: 420px; }

.connector {
  position: absolute;
  background: #cad7ee;
}

.v1 { width: 4px; height: 100px; top: 300px; left: 798px; }
.v2 { width: 4px; height: 112px; bottom: 220px; left: 798px; }
.h1 { height: 4px; width: 290px; top: 486px; left: 472px; }
.h2 { height: 4px; width: 290px; top: 486px; right: 472px; }

.caption {
  margin-top: 16px;
  font-size: 21px;
  color: var(--muted);
}

:root {
  --bg: linear-gradient(135deg, #f7fafc 0%, #eef4fb 100%);
  --panel: #ffffff;
  --ink: #132237;
  --muted: #62748a;
  --line: #d8e1eb;
  --primary: #2267d8;
  --primary-soft: #eaf1ff;
  --warning: #e28a2e;
  --warning-soft: #fff1de;
  --positive: #1b8f67;
  --positive-soft: #e8f7f0;
  --danger: #d44f4f;
  --danger-soft: #fcecec;
}

.soft-blue { background: var(--primary-soft); border-color: #cfdcff; }
.soft-gray { background: #f3f6fa; border-color: #d7e0ea; }
.soft-orange { background: var(--warning-soft); border-color: #ffd8ad; }
.soft-green { background: var(--positive-soft); border-color: #bee8d9; }
.soft-red { background: var(--danger-soft); border-color: #f2c5c5; }

.hero-note {
  margin-top: 48px;
  width: 720px;
  padding: 22px 24px;
  border-radius: 22px;
  background: rgba(255,255,255,0.78);
  border: 1px solid #d8e1eb;
  box-shadow: 0 14px 36px rgba(28, 53, 86, 0.08);
  font-size: 24px;
  line-height: 1.6;
  color: var(--muted);
}

.big-arrow {
  display: flex;
  justify-content: center;
  margin-top: 24px;
  color: #7b8ea8;
  font-size: 60px;
  font-weight: 800;
}

.summary-band {
  margin-top: 26px;
  padding: 24px 28px;
  border-radius: 24px;
  border: 2px solid #9fb9e8;
  background: #f7faff;
  text-align: center;
}

.summary-band strong {
  display: block;
  font-size: 34px;
  color: #234e95;
}

.summary-band span {
  display: block;
  margin-top: 10px;
  font-size: 23px;
  line-height: 1.45;
  color: #526985;
}

.mini p {
  font-size: 22px;
}
</style>
</head>
<body>
    <div class="canvas">
      <h1 class="title">結論</h1>
      <p class="subtitle">複数の要素をひとつの運用として束ね、その先で組織化へつなげる</p>
      <div style="margin-top:44px;">
        <div class="grid-4" style="gap:14px;">
          <div class="card soft-blue" style="padding:18px 16px; opacity:0.92;">
            <h3 style="font-size:24px; text-align:center; margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:10px;">
              <span style="display:inline-grid; place-items:center; width:28px; height:28px; border:2px solid #6e8fbd; border-radius:999px; position:relative;">
                <span style="display:block; width:8px; height:8px; background:#6e8fbd; border-radius:999px;"></span>
              </span>
              対象
            </h3>
            <p style="font-size:16px; text-align:center;">何に使うかを明確にする</p>
          </div>
          <div class="card soft-blue" style="padding:18px 16px; opacity:0.92;">
            <h3 style="font-size:24px; text-align:center; margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:10px;">
              <span style="display:inline-flex; align-items:center; gap:4px;">
                <span style="display:block; width:7px; height:7px; background:#6e8fbd; border-radius:999px;"></span>
                <span style="display:block; width:10px; height:2px; background:#6e8fbd;"></span>
                <span style="display:block; width:7px; height:7px; background:#6e8fbd; border-radius:999px;"></span>
                <span style="display:block; width:10px; height:2px; background:#6e8fbd;"></span>
                <span style="display:block; width:7px; height:7px; background:#6e8fbd; border-radius:999px;"></span>
              </span>
              手順
            </h3>
            <p style="font-size:16px; text-align:center;">仕事を分解して扱う</p>
          </div>
          <div class="card soft-blue" style="padding:18px 16px; opacity:0.92;">
            <h3 style="font-size:22px; text-align:center; margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:10px;">
              <span style="display:inline-block; width:22px; height:26px; border:2px solid #6e8fbd; border-radius:4px; position:relative;">
                <span style="position:absolute; left:4px; top:5px; width:10px; height:2px; background:#6e8fbd;"></span>
                <span style="position:absolute; left:4px; top:11px; width:12px; height:2px; background:#6e8fbd;"></span>
                <span style="position:absolute; left:4px; top:17px; width:9px; height:2px; background:#6e8fbd;"></span>
              </span>
              知識
            </h3>
            <p style="font-size:16px; text-align:center;">必要な文脈を供給する</p>
          </div>
          <div class="card soft-blue" style="padding:18px 16px; opacity:0.92;">
            <h3 style="font-size:22px; text-align:center; margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:10px;">
              <span style="display:inline-grid; place-items:center; width:28px; height:28px; border:2px solid #6e8fbd; border-radius:8px; color:#6e8fbd; font-size:18px; font-weight:800;">✓</span>
              確認・役割
            </h3>
            <p style="font-size:16px; text-align:center;">レビューと責任分担を置く</p>
          </div>
        </div>
        <div class="big-arrow" style="margin-top:8px; font-size:82px; color:#6e8fbd; line-height:1;">↓</div>
        <div style="display:flex; justify-content:center; margin-top:6px;">
          <div class="card" style="width:1080px; padding:16px; border:1px solid #d8e1eb; background:linear-gradient(135deg, #f7fbff 0%, #edf4ff 100%); box-shadow:0 18px 38px rgba(21,34,53,0.10);">
            <div style="border:2px solid #9fb9e8; border-radius:24px; background:rgba(255,255,255,0.88); padding:22px 26px;">
              <div style="display:flex; align-items:center; justify-content:center; gap:16px;">
                <span style="display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:999px; background:#eaf1ff; color:#2267d8; font-size:18px; font-weight:800;">
                  <span style="display:block; width:10px; height:10px; background:#2267d8; border-radius:999px; box-shadow:-14px 0 0 #9fb9e8, 14px 0 0 #9fb9e8;"></span>
                  中心
                </span>
                <h3 style="font-size:44px; text-align:center; color:#234e95; margin:0;">統制された運用</h3>
              </div>
              <p style="font-size:26px; text-align:center; color:#4f6584; margin-top:12px;">バラバラの対策ではなく、ひとつの運用としてつながった状態で回し続ける</p>
            </div>
          </div>
        </div>
        <div class="big-arrow" style="margin-top:10px; font-size:82px; color:#6e8fbd; line-height:1;">↓</div>
        <div style="display:flex; justify-content:center; margin-top:6px;">
          <div class="card" style="width:900px; padding:24px 24px; border:1px solid #c9d7ea; background:#f8fbff; box-shadow:0 16px 34px rgba(21,34,53,0.08);">
            <h3 style="font-size:38px; text-align:center; color:#1f4f93; margin-bottom:12px; display:flex; align-items:center; justify-content:center; gap:14px;">
              <span style="display:inline-flex; gap:4px; align-items:flex-end;">
                <span style="display:block; width:10px; height:10px; background:#6e8fbd; border-radius:999px;"></span>
                <span style="display:block; width:10px; height:18px; background:#6e8fbd; border-radius:999px;"></span>
                <span style="display:block; width:10px; height:26px; background:#6e8fbd; border-radius:999px;"></span>
              </span>
              AI を組織的に扱う
            </h3>
            <p style="font-size:22px; text-align:center; color:#526985;">統制の単位を持つことで、AI を本番利用に乗せやすくなる</p>
          </div>
        </div>
      </div>
      <div class="summary-band" style="margin-top:10px; padding:18px 24px;">
        <strong style="font-size:30px;">本番利用には、要素を揃えるだけでなく、統制された運用として束ねることが欠かせない</strong>
        <span style="font-size:21px;">そして、この束ね方を持つことが、AI を組織的に扱うことにつながっていきます。</span>
      </div>
    </div></body>
</html>
