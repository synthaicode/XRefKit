<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>人間はトレードオフ、優先度、受容リスク、最終承認の境界を持ちます。</title>
  <style>:root {
  --bg: #f8f9fa;
  --panel: #ffffff;
  --ink: #0f172a;
  --muted: #475569;
  --line: #dbe3ee;
  --blue: #2563eb;
  --blue-soft: #eff6ff;
  --green: #0f766e;
  --amber: #b45309;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: Inter, "Noto Sans JP", sans-serif;
}

.slide {
  width: 1600px;
  height: 900px;
  padding: 44px 56px 0;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at top right, #dbeafe 0, transparent 28%),
    linear-gradient(180deg, #fafafa 0%, #f8f9fa 100%);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
}

.eyebrow {
  font-size: 24px;
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.title {
  margin: 10px 0 0;
  font-size: 46px;
  line-height: 1.12;
  font-weight: 900;
  max-width: 1120px;
}

.brand {
  padding: 10px 16px;
  border-radius: 999px;
  background: var(--panel);
  border: 1px solid var(--line);
  font-size: 24px;
  font-weight: 800;
}

.question-wrap {
  display: grid;
  place-items: center;
  height: 680px;
}

.question-box {
  max-width: 1100px;
  padding: 36px 44px;
  border-radius: 32px;
  background: var(--panel);
  border: 2px solid #bfdbfe;
  box-shadow: 0 24px 60px rgba(37, 99, 235, 0.08);
}

.question-label {
  font-size: 24px;
  font-weight: 800;
  color: var(--blue);
  margin-bottom: 14px;
}

.question-text {
  font-size: 60px;
  line-height: 1.2;
  font-weight: 800;
}

.summary {
  margin-top: 28px;
  padding: 22px 26px;
  border-radius: 24px;
  background: var(--panel);
  border: 1px solid var(--line);
}

.summary-label {
  font-size: 22px;
  font-weight: 800;
  color: var(--blue);
  margin-bottom: 10px;
}

.summary-title {
  font-size: 36px;
  line-height: 1.18;
  font-weight: 900;
}

.summary-copy {
  margin-top: 10px;
  font-size: 24px;
  line-height: 1.55;
  color: var(--muted);
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 22px;
}

.card {
  min-height: 220px;
  padding: 24px;
  border-radius: 24px;
  background: var(--panel);
  border: 1px solid var(--line);
  box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
}

.card-tag {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 18px;
  font-weight: 800;
  background: var(--blue-soft);
  color: var(--blue);
}

.card h3 {
  margin: 14px 0 10px;
  font-size: 28px;
  line-height: 1.25;
}

.card p {
  margin: 0;
  font-size: 22px;
  line-height: 1.5;
  color: var(--muted);
}

.takeaway {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 18px 56px 22px;
  background: var(--blue-soft);
  border-top: 4px solid var(--blue);
  font-size: 26px;
  line-height: 1.45;
  font-weight: 700;
}

.takeaway strong {
  color: var(--blue);
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 18px;
}

.chip {
  padding: 10px 14px;
  border-radius: 999px;
  background: #ecfeff;
  color: var(--green);
  font-size: 20px;
  font-weight: 700;
}

.chip.warn {
  background: #fff7ed;
  color: var(--amber);
}
</style>
</head>
<body>
  <main class="slide">
    <header class="header">
      <div>
        <div class="eyebrow">Repository Overview</div>
        <h1 class="title">現在の XRefKit を短く説明します。</h1>
      </div>
      <div class="brand">XRefKit</div>
    </header>
    <section class="question-wrap">
      <div class="question-box">
        <div class="question-label">Question</div>
        <div class="question-text">それでも、人間はどこで判断するのですか。</div>
      </div>
    </section>
    <div class="takeaway"><strong>視聴者の疑問</strong>を先に置き、その次に一つずつ説明します。</div>
  </main>
</body>
</html>
