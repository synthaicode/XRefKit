<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#F8F9FA"/>
  <rect x="0" y="788" width="1600" height="112" fill="#EFF6FF"/>
  <rect x="0" y="788" width="1600" height="4" fill="#2563EB"/>
  <text x="100" y="128" fill="#2563EB" font-size="26" font-family="Inter, Noto Sans JP, sans-serif" font-weight="700" letter-spacing="5">06 / FIRST 30 MINUTES</text>
  <text x="100" y="214" fill="#111827" font-size="58" font-family="Inter, Noto Sans JP, sans-serif" font-weight="800">最初の30分でここまで書く</text>
  <rect x="120" y="292" width="620" height="430" rx="30" fill="#FFFFFF" stroke="#D1D5DB"/>
  <rect x="860" y="292" width="620" height="430" rx="30" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="160" y="350" fill="#111827" font-size="30" font-family="Inter, Noto Sans JP, sans-serif" font-weight="800">まず埋める 7 項目</text>
  <text x="160" y="406" fill="#374151" font-size="27" font-family="Inter, Noto Sans JP, sans-serif">1. 開始条件</text>
  <text x="160" y="446" fill="#374151" font-size="27" font-family="Inter, Noto Sans JP, sans-serif">2. 入力物</text>
  <text x="160" y="486" fill="#374151" font-size="27" font-family="Inter, Noto Sans JP, sans-serif">3. 判断点</text>
  <text x="160" y="526" fill="#374151" font-size="27" font-family="Inter, Noto Sans JP, sans-serif">4. 出力物</text>
  <text x="160" y="566" fill="#374151" font-size="27" font-family="Inter, Noto Sans JP, sans-serif">5. 差し戻し条件</text>
  <text x="160" y="606" fill="#374151" font-size="27" font-family="Inter, Noto Sans JP, sans-serif">6. 参照ルール</text>
  <text x="160" y="646" fill="#374151" font-size="27" font-family="Inter, Noto Sans JP, sans-serif">7. 未確定事項</text>
  <text x="160" y="696" fill="#6B7280" font-size="24" font-family="Inter, Noto Sans JP, sans-serif">完璧な手順書は後でよい</text>
  <text x="900" y="350" fill="#111827" font-size="30" font-family="Inter, Noto Sans JP, sans-serif" font-weight="800">内容確認担当の記入例</text>
  <text x="900" y="404" fill="#374151" font-size="25" font-family="Inter, Noto Sans JP, sans-serif">開始条件: 受付担当から確認依頼が届く</text>
  <text x="900" y="444" fill="#374151" font-size="25" font-family="Inter, Noto Sans JP, sans-serif">入力物: 申請書 / 添付資料 / 対象一覧</text>
  <text x="900" y="484" fill="#374151" font-size="25" font-family="Inter, Noto Sans JP, sans-serif">判断点: 記載不足 / 基準適合 / 例外要否</text>
  <text x="900" y="524" fill="#374151" font-size="25" font-family="Inter, Noto Sans JP, sans-serif">出力物: 確認結果 / 差し戻し理由</text>
  <text x="900" y="564" fill="#374151" font-size="25" font-family="Inter, Noto Sans JP, sans-serif">差し戻し条件: 添付不足 / 記載不備</text>
  <text x="900" y="604" fill="#374151" font-size="25" font-family="Inter, Noto Sans JP, sans-serif">参照ルール: 申請基準 / 例外条件</text>
  <text x="900" y="644" fill="#374151" font-size="25" font-family="Inter, Noto Sans JP, sans-serif">未確定事項: 判断不能時の確認先</text>
</svg>
