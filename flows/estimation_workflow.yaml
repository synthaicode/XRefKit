phase: normal
owner:
  primary: planning_group
runs_after:
  - FLOW-INVESTIGATION
runs_before:
  - FLOW-REQUIREMENTS
inputs:
  - investigation_outputs
  - supplier_definitions
  - budget_context
outputs:
  - supplier_comparison_result
  - cost_patterns
  - solution_options
  - ambiguity_classification
