sequence:
  - supplier_four_condition_check
  - cost_estimation
  - solution_option_generation
  - assumption_ambiguity_classification
control_rules:
  - does_not_approve_supplier_adoption
  - does_not_approve_final_budget
  - unresolved_assumptions_must_remain_explicit
